<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Teacher Login</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

    <div class="container">

        <div class="icon">
            🔒
        </div>

        <h1>Teacher Login</h1>

        <p class="description">
            Log in to manage attendance.
        </p>

        <form method="POST">

            <label for="username">
                Username
            </label>

            <input
                id="username"
                name="username"
                type="text"
                placeholder="Teacher username"
                required
            >

            <label
                for="password"
                class="second-label"
            >
                Password
            </label>

            <input
                id="password"
                name="password"
                type="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Log In
            </button>

        </form>

        {% if message %}

            <div class="message error-message">
                {{ message }}
            </div>

        {% endif %}

    </div>

</body>

</html>
